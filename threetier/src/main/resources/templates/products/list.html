<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>입력</title>
</head>
<body>
<!--GET은 데이터 조회할 때, POST는 데이터 저장 / 추가는 DB에 저장 -> POST-->
    <form th:action="@{/products/list}" method="post" th:object="${productVO}">
        <div>
            <span>상품명</span>
            <input type="text" th:field="*{productName}">
        </div>

        <div>
            <span>상품가격</span>
            <input type="text" th:field="*{productPrice}">
        </div>

        <div>
            <span>재고</span>
            <input type="text" th:field="*{productStock}">
        </div>

        <div>
            <span>브랜드</span>
            <input type="text" th:field="*{productBrand}">
        </div>
        <button>추가</button>
    </form>
</body>
</html>
