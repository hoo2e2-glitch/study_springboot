<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>상세목록조회</title>
</head>
<body>
    <th:block th:object="${post}">
            <p th:text="*{postTitle}"></p>
            <p th:text="*{postContent}"></p>
            <p th:text="*{memberName}"></p>
            <p th:text="'조회수:' + *{postReadCount}"></p>
            <a th:href="@{/posts/update(id=*{id})}"><button >수정하기</button></a>
<!--            <a th:href="@{/posts/delete-ok(id=*{id})}"><button >삭제</button></a>-->
<!--        POST로 삭제하면?-->
<!--        → URL에 id 안 보임-->
<!--        → form 통해서만 전송 가능 → 더 안전!-->

        <form th:action="@{/posts/delete}" method="post">
            <input type="hidden" name="id" th:value="*{id}">
            <button >삭제하기</button>
        </form>


        <a th:href="@{/posts/list}"><button >돌아가기</button></a>

    </th:block>

</body>
</html>
