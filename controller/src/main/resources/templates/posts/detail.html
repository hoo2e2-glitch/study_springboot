<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>상세목록조회</title>
</head>
<body>
<!--게시판리스트 화면출력하기-->
<table border="1">
    <tr>
        <th>아이디</th>
        <th>제목</th>
        <th>내용</th>
        <th>작성자</th>
        <th>조회수</th>
    </tr>
    <tr >
        <td th:text="${post.id}"></td>
        <td th:text="${post.postTitle}"></td>
        <td th:text="${post.postContent}"></td>
        <td th:text="${post.memberId}"></td>
        <td th:text="${post.postReadCount}"></td>
    </tr>
</table>
<button>수정하기</button>
<button>삭제하기</button>
<a th:href="@{/posts/list}"><button >돌아가기</button></a>

</body>
</html>
